version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: timecontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timecontrol
      POSTGRES_PASSWORD: timecontrol_secret
      POSTGRES_DB: timecontrol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timecontrol -d timecontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
